name: Build ginkgo kernel (Sakura .245, SIG off)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  # Sakura ginkgo branch "11" = 4.14.245, the kernel crDroid 11 (Android 11) uses.
  # Proven to boot A11 -> no bootloop like celtare/MIUI (wrong-lineage) kernels.
  KERNEL_REPO: https://github.com/Sakura-Devices/kernel_xiaomi_ginkgo
  KERNEL_BRANCH: "11"
  DEFCONFIG: vendor/ginkgo-perf_defconfig
  CCACHE_DIR: /home/runner/.ccache

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout packaging repo
        uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison flex libssl-dev make gcc \
            git zip curl python3 libncurses-dev ccache

      - name: Cache toolchains (proton + AOSP gcc)
        uses: actions/cache@v4
        with:
          path: |
            clang
            gcc64
            gcc32
          key: toolchains-proton13-aospgcc49-v2

      - name: Clone kernel source (Sakura .245)
        run: git clone --depth=1 -b "$KERNEL_BRANCH" "$KERNEL_REPO" kernel

      - name: Clone proton-clang (CC) [if not cached]
        run: |
          if [ ! -x clang/bin/clang ]; then rm -rf clang; git clone --depth=1 https://github.com/kdrag0n/proton-clang clang; fi
          chmod -R +x clang/bin || true

      - name: "Clone AOSP GCC 4.9 (GNU as/ld/binutils) [if not cached]"
        run: |
          if [ ! -x gcc64/bin/aarch64-linux-android-as ]; then rm -rf gcc64; git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 gcc64; fi
          if [ ! -x gcc32/bin/arm-linux-androideabi-as ]; then rm -rf gcc32; git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 gcc32; fi
          chmod -R +x gcc64/bin gcc32/bin || true

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: /home/runner/.ccache
          key: ccache-sakura-${{ github.sha }}
          restore-keys: ccache-sakura-

      - name: Patch defconfig (SIG_FORCE off, MODVERSIONS off, EFI off, FORCE_LOAD on)
        working-directory: kernel
        run: |
          cfg="arch/arm64/configs/$DEFCONFIG"
          # goal: load a module without a trusted signing key
          sed -i 's/^CONFIG_MODULE_SIG_FORCE=y/# CONFIG_MODULE_SIG_FORCE is not set/' "$cfg"
          # ld.lld rejects R_AARCH64_ABS32 from MODVERSIONS __crc_* and the EFI stub.
          sed -i 's/^CONFIG_MODVERSIONS=y/# CONFIG_MODVERSIONS is not set/' "$cfg"
          sed -i 's/^CONFIG_EFI=y/# CONFIG_EFI is not set/' "$cfg"
          grep -q '^# CONFIG_EFI is not set$' "$cfg" || echo '# CONFIG_EFI is not set' >> "$cfg"
          # let `insmod -f` load the target .ko despite vermagic/CRC mismatch
          grep -q '^CONFIG_MODULE_FORCE_LOAD=y' "$cfg" || echo 'CONFIG_MODULE_FORCE_LOAD=y' >> "$cfg"
          echo "----- config after patch -----"
          grep -E "MODULE_SIG_FORCE|MODVERSIONS|CONFIG_EFI|MODULE_FORCE_LOAD|LOCALVERSION=|CPU_MASK" "$cfg" || true

      - name: Build kernel
        working-directory: kernel
        run: |
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
          export ARCH=arm64 SUBARCH=arm64
          export CCACHE_MAXSIZE=3G CCACHE_COMPILERCHECK=content
          GCC64="$GITHUB_WORKSPACE/gcc64/bin/aarch64-linux-android-"
          GCC32="$GITHUB_WORKSPACE/gcc32/bin/arm-linux-androideabi-"
          # host GCC 11+ -fno-common breaks 4.14's bundled dtc (yylloc) -> -fcommon
          HOSTCFLAGS="-Wall -Wmissing-prototypes -Wstrict-prototypes -O2 -fomit-frame-pointer -std=gnu89 -fcommon"
          make O=out ARCH=arm64 "$DEFCONFIG"
          make O=out ARCH=arm64 HOSTCFLAGS="$HOSTCFLAGS" olddefconfig
          # compile: clang(+ccache) + AOSP gcc assembler + llvm binutils; link: ld.lld
          make -j"$(nproc)" O=out ARCH=arm64 \
            CC="ccache clang" \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE="$GCC64" \
            CROSS_COMPILE_ARM32="$GCC32" \
            LD=ld.lld \
            AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            HOSTCFLAGS="$HOSTCFLAGS" \
            Image.gz-dtb
          ccache -s 2>/dev/null | grep -E "cache hit|files in cache" || true

      - name: Package flashable zip (AnyKernel3)
        run: |
          IMG=kernel/out/arch/arm64/boot/Image.gz-dtb
          test -f "$IMG" || { echo "Image.gz-dtb not built"; exit 1; }
          cp "$IMG" anykernel/Image.gz-dtb
          cd anykernel
          zip -r9 "../ginkgo-sakura-4.14.245-$(date +%Y%m%d).zip" . -x ".git*"

      - name: Upload flashable zip
        uses: actions/upload-artifact@v4
        with:
          name: ginkgo-sakura-kernel-zip
          path: ginkgo-sakura-4.14.245-*.zip
